version: '3.8'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8080/health'); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 2s
      retries: 3
      start_period: 10s
    networks:
      - app
    env_file:
      - ./backend/.env

  nginx:
    image: nginxinc/nginx-unprivileged:alpine3.23
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    ports:
      - "80:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app

networks:
  app:
    driver: bridge
